<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한가온컴퍼니 | 최고관리자 대시보드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0A192F;
            --beige: #F5EFE6;
            --white: #ffffff;
            --border: #e2e8f0;
            --gray-light: #f8fafc;
            --text-main: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: var(--text-main);
        }

        .sidebar {
            width: 260px;
            background: var(--navy);
            height: 100vh;
            position: fixed;
            color: white;
            padding: 30px 20px;
        }

        .sidebar h1 {
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .nav-item {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .nav-item:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .main-content {
            margin-left: 260px;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--navy);
        }

        .data-table-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border);
            font-size: 0.9rem;
            color: #64748b;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.routeA {
            background: #dcfce7;
            color: #166534;
        }

        .badge.routeB {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--navy);
            color: white;
        }

        .btn-outline {
            border: 1px solid var(--border);
            background: white;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 0;
                padding: 0;
            }

            .main-content {
                margin-left: 0;
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            header h2 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h1>HANGAON CRM</h1>
        <div class="nav-item active"><i class="fas fa-chart-pie"></i> 진단 결과 관리</div>
        <div class="nav-item"><i class="fas fa-users"></i> 방문자 명단</div>
        <div class="nav-item"><i class="fas fa-cog"></i> 설정</div>
    </div>

    <div class="main-content">
        <header>
            <h2>KMEX 병의원 경영 진단 리얼타임 대시보드</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-outline" onclick="loadData()"><i class="fas fa-sync"></i> 새로고침</button>
                <button class="btn btn-primary" onclick="exportCSV()"><i class="fas fa-download"></i> 데이터
                    추출(CSV)</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>전체 참여자</h3>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>개원 예정 (Route A)</h3>
                <div class="value" id="routeACount">0</div>
            </div>
            <div class="stat-card">
                <h3>기개원 (Route B)</h3>
                <div class="value" id="routeBCount">0</div>
            </div>
            <div class="stat-card">
                <h3>오늘의 방문자</h3>
                <div class="value" id="todayCount">0</div>
            </div>
        </div>

        <div class="data-table-container">
            <h3>진단 응답 목록</h3>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>이름</th>
                        <th>연락처</th>
                        <th>이메일</th>
                        <th>마케팅동의</th>
                        <th>유형</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="dataBody">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function loadData() {
            const raw = localStorage.getItem('diagnosis_results') || '[]';
            const data = JSON.parse(raw);

            // Sort by latest
            data.sort((a, b) => b.id - a.id);

            // Update Stats
            document.getElementById('totalCount').innerText = data.length;
            const routeA = data.filter(d => d.route === 'routeA').length;
            const routeB = data.filter(d => d.route === 'routeB').length;
            document.getElementById('routeACount').innerText = routeA;
            document.getElementById('routeBCount').innerText = routeB;

            const today = new Date().toLocaleDateString();
            const todayCount = data.filter(d => new Date(d.date).toLocaleDateString() === today).length;
            document.getElementById('todayCount').innerText = todayCount;

            // Render Table
            const body = document.getElementById('dataBody');
            body.innerHTML = '';

            data.forEach(item => {
                const tr = document.createElement('tr');
                const date = new Date(item.date).toLocaleString('ko-KR', { hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                const routeBadge = item.route === 'routeA' ? '<span class="badge routeA">개원예정</span>' : '<span class="badge routeB">기개원</span>';
                const marketingBadge = item.userInfo.marketing ? '<span style="color:green">동의</span>' : '<span style="color:red">미동의</span>';

                tr.innerHTML = `
                    <td>${date}</td>
                    <td>${item.userInfo.name}</td>
                    <td>${item.userInfo.phone}</td>
                    <td>${item.userInfo.email}</td>
                    <td>${marketingBadge}</td>
                    <td>${routeBadge}</td>
                    <td>
                        <button class="btn btn-outline" style="padding: 4px 8px; font-size: 0.8rem;" onclick="viewDetail(${item.id})">상세보기</button>
                    </td>
                `;
                body.appendChild(tr);
            });

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px; color:#aaa;">아직 참여 데이터가 없습니다.</td></tr>';
            }
        }

        function viewDetail(id) {
            const raw = localStorage.getItem('diagnosis_results') || '[]';
            const data = JSON.parse(raw);
            const item = data.find(d => d.id == id);
            if (!item) return;

            let resText = `[${item.userInfo.name} 원장님 상세 응답]\\n`;
            resText += `유형: ${item.route === 'routeA' ? '개원예정' : '기개원'}\\n\\n`;

            for (const [key, value] of Object.entries(item.responses)) {
                resText += `${key}: ${value}\\n`;
            }

            alert(resText);
        }

        function exportCSV() {
            const raw = localStorage.getItem('diagnosis_results') || '[]';
            const data = JSON.parse(raw);
            if (data.length === 0) return alert("데이터가 없습니다.");

            let csv = "날짜,이름,연락처,이메일,유형\\n";
            data.forEach(item => {
                const date = new Date(item.date).toLocaleString();
                const route = item.route === 'routeA' ? '개원예정' : '기개원';
                csv += `\${date},\${item.userInfo.name},\${item.userInfo.phone},\${item.userInfo.email},\${route}\\n`;
            });

            const blob = new Blob(["\\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `KMEX_Diagnosis_Data_\${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Initial Load
        loadData();
    </script>
</body>

</html>
